steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/myfirstvote:prod'
      - '-t'
      - 'gcr.io/$PROJECT_ID/myfirstvote:latest'
      - '.'

  # Step 2: Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/myfirstvote:prod'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/myfirstvote:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'myfirstvote'
      - '--image'
      - 'gcr.io/$PROJECT_ID/myfirstvote:prod'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'NODE_ENV=production,SUPABASE_URL=$$SUPABASE_URL,SUPABASE_PUBLISHABLE_KEY=$$SUPABASE_PUBLISHABLE_KEY,VITE_SUPABASE_URL=$$VITE_SUPABASE_URL,VITE_SUPABASE_PUBLISHABLE_KEY=$$VITE_SUPABASE_PUBLISHABLE_KEY,VITE_SUPABASE_PROJECT_ID=$$VITE_SUPABASE_PROJECT_ID,OPENROUTER_API_KEY=$$OPENROUTER_API_KEY,VITE_OPENROUTER_API_KEY=$$VITE_OPENROUTER_API_KEY'
    secretEnv:
      - 'SUPABASE_URL'
      - 'SUPABASE_PUBLISHABLE_KEY'
      - 'VITE_SUPABASE_URL'
      - 'VITE_SUPABASE_PUBLISHABLE_KEY'
      - 'VITE_SUPABASE_PROJECT_ID'
      - 'OPENROUTER_API_KEY'
      - 'VITE_OPENROUTER_API_KEY'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/SUPABASE_URL/versions/latest
      env: 'SUPABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/SUPABASE_PUBLISHABLE_KEY/versions/latest
      env: 'SUPABASE_PUBLISHABLE_KEY'
    - versionName: projects/$PROJECT_ID/secrets/VITE_SUPABASE_URL/versions/latest
      env: 'VITE_SUPABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/VITE_SUPABASE_PUBLISHABLE_KEY/versions/latest
      env: 'VITE_SUPABASE_PUBLISHABLE_KEY'
    - versionName: projects/$PROJECT_ID/secrets/VITE_SUPABASE_PROJECT_ID/versions/latest
      env: 'VITE_SUPABASE_PROJECT_ID'
    - versionName: projects/$PROJECT_ID/secrets/OPENROUTER_API_KEY/versions/latest
      env: 'OPENROUTER_API_KEY'
    - versionName: projects/$PROJECT_ID/secrets/VITE_OPENROUTER_API_KEY/versions/latest
      env: 'VITE_OPENROUTER_API_KEY'

images:
  - 'gcr.io/$PROJECT_ID/myfirstvote:prod'
  - 'gcr.io/$PROJECT_ID/myfirstvote:latest'

options:
  logging: CLOUD_LOGGING_ONLY
